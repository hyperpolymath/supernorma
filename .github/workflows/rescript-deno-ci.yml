# SPDX-License-Identifier: MPL-2.0
name: ReScript/Deno CI
on:
  push:
    branches: [main, master]
  pull_request:

# Estate guardrail: scope push to default branches so a PR fires once (not
# push+PR), and cancel superseded runs. Safe — read-only PR-triggered check.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v1.x
      - name: Deno lint
        run: deno lint
      - name: Deno fmt check
        run: deno fmt --check
      - name: Deno test
        run: deno test --allow-all --coverage=coverage
      - name: ReScript build
        # Note: RSR prefers avoiding npm. This uses pinned versions for reproducibility.
        # Consider switching to esno/Deno-native ReScript tooling when available.
        run: |
          if [ -f "rescript.json" ] || [ -f "bsconfig.json" ]; then
            # Pin to specific version for supply chain security
            npm install --ignore-scripts rescript@11.1.4 @rescript/core@1.6.1
            npx --yes rescript@11.1.4
          fi
      - name: Type check
        run: deno check **/*.ts || true
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
      - name: Check permissions
        run: |
          # Audit for dangerous permissions
          grep -rE "allow-run|allow-write|allow-env" . || echo "No dangerous permissions"
