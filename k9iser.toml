#
# k9iser manifest for supernorma
# Dev standards tool — Deno/ReScript tool for auditing and enforcing development standards across repos

[project]
name = "supernorma"
safety_tier = "hunt"

[[source]]
path = "deno.json"
type = "deno"
output = "generated/k9iser/deno-workspace.k9"

[[source]]
path = "Justfile"
type = "justfile"
output = "generated/k9iser/justfile-recipes.k9"

[[source]]
path = ".github/workflows/hypatia-scan.yml"
type = "workflow"
output = "generated/k9iser/ci-security.k9"

[[constraint]]
rule = "build.dependencies has no banned_packages"
severity = "error"

[[constraint]]
rule = "deno.imports has no npm: specifiers"
severity = "error"
